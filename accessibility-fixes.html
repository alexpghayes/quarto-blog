<script>
document.addEventListener('DOMContentLoaded', function () {
  // Fix: #title-block-header sits between the site <header> and <main>, so its
  // content (h1, subtitle, date) is outside every landmark. Moving it to the top
  // of <main> puts it inside the main landmark and eliminates the duplicate
  // role="banner" produced by having two top-level <header> elements.
  var titleHeader = document.getElementById('title-block-header');
  var mainContent = document.getElementById('quarto-document-content');
  if (titleHeader && mainContent) {
    mainContent.insertBefore(titleHeader, mainContent.firstChild);
  }

  // Fix: <nav class="navbar"> and <nav id="quarto-sidebar"> both have implicit
  // role="navigation" with no label, producing duplicate unlabelled nav landmarks.
  var siteNav = document.querySelector('#quarto-header nav.navbar');
  if (siteNav && !siteNav.getAttribute('aria-label')) {
    siteNav.setAttribute('aria-label', 'Site');
  }

  var sidebar = document.getElementById('quarto-sidebar');
  if (sidebar && !sidebar.getAttribute('aria-label')) {
    sidebar.setAttribute('aria-label', 'On this page');
  }

  // Fix: #quarto-margin-sidebar is a plain <div> with no landmark role, so its
  // content (TOC, margin notes) is outside every landmark. Adding
  // role="complementary" makes it an <aside>-equivalent landmark.
  var marginSidebar = document.getElementById('quarto-margin-sidebar');
  if (marginSidebar && !marginSidebar.getAttribute('role')) {
    marginSidebar.setAttribute('role', 'complementary');
    marginSidebar.setAttribute('aria-label', 'On this page');
  }

  // Fix: #quarto-search-results is outside every landmark.
  var searchResults = document.getElementById('quarto-search-results');
  if (searchResults && !searchResults.getAttribute('role')) {
    searchResults.setAttribute('role', 'region');
    searchResults.setAttribute('aria-label', 'Search results');
  }

  // Fix: #quarto-sidebar-glass is outside every landmark.
  var sidebarGlass = document.getElementById('quarto-sidebar-glass');
  if (sidebarGlass && !sidebarGlass.getAttribute('aria-hidden')) {
    sidebarGlass.setAttribute('aria-hidden', 'true');
  }

  // Fix: collapsible callout headers need role="button" and tabindex="0"
  // to be keyboard accessible and correctly support their ARIA attributes.
  var calloutHeaders = document.querySelectorAll('.callout-header[data-bs-toggle="collapse"]');
  calloutHeaders.forEach(function (header) {
    if (!header.getAttribute('role')) {
      header.setAttribute('role', 'button');
    }
    if (!header.getAttribute('tabindex')) {
      header.setAttribute('tabindex', '0');
    }
  });

  // Fix: ARIA progressbar nodes must have an accessible name.
  // Fix: profvis separator images are decorative and need alt="" or role="presentation".
  // Fix: Scrollable regions need tabindex="0" to be keyboard accessible.
  var fixDynamicContent = function() {
    var progressBars = document.querySelectorAll('[role="progressbar"]');
    progressBars.forEach(function (bar) {
      if (!bar.getAttribute('aria-label') && !bar.getAttribute('aria-labelledby')) {
        bar.setAttribute('aria-label', 'Progress');
      }
    });

    var profvisSeparators = document.querySelectorAll('.profvis-status-bar .separator-image');
    profvisSeparators.forEach(function (img) {
      if (!img.hasAttribute('alt')) {
        img.setAttribute('alt', '');
      }
    });

    var scrollableRegions = document.querySelectorAll('.cell-output-display, .column-page, .cell-output pre, .sourceCode pre');
    scrollableRegions.forEach(function (el) {
      if ((el.clientWidth < el.scrollWidth || el.clientHeight < el.scrollHeight) && !el.hasAttribute('tabindex')) {
        el.setAttribute('tabindex', '0');
      }
    });
  };
  fixDynamicContent();
  new MutationObserver(fixDynamicContent).observe(document.body, {
    childList: true,
    subtree: true
  });
  window.addEventListener('resize', fixDynamicContent);
});
</script>
